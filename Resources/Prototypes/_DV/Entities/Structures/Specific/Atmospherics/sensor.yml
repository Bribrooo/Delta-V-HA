- type: entity
  parent: AirSensor
  id: AirSensorGray
  suffix: gray
  - type: Sprite
    drawdepth: FloorObjects
    sprite: _DV/Structures/Specific/Atmospherics/sensor.rsi
    layers:
    - state: gsensor1
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]

- type: entity
  parent: AirSensorAssembly
  id: AirSensorGrayAssembly
  suffix: gray
  components:
  - type: Sprite
    drawdepth: FloorObjects
    sprite: _DV/Structures/Specific/Atmospherics/sensor.rsi
    layers:
    - state: gsensor0


# put this in a burn chamber or something you don't want to have show up as dangerous
- type: entity
  parent: [ AirSensor, BaseUnsetSensor ]
  id: AirSensorUnset

- type: entity
  parent: [ AirSensorGray, BaseUnsetSensor ]
  id: AirSensorUnsetGray

- type: entity
  abstract: true
  id: BaseUnsetSensor
  suffix: Unset
  components:
  - type: AtmosMonitor
    temperatureThresholdId: ignore
    pressureThresholdId: ignore
    gasThresholdPrototypes:
      Oxygen: ignore
      Nitrogen: ignore
      CarbonDioxide: ignore
      Plasma: ignore
      Tritium: ignore
      WaterVapor: ignore
      Ammonia: ignore
      NitrousOxide: ignore
      Frezon: ignore
