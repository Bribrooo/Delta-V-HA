- type: entity
  id: AirSensorGray
  name: air sensor
  description: Air sensor. It senses air.
  parent: AirSensorBase
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Physics
    canCollide: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Clickable
  - type: InteractionOutline
  - type: ApcPowerReceiver
  - type: ExtensionCableReceiver
  - type: AccessReader
    access: [ [ "Atmospherics" ] ]
  - type: Construction
    graph: AirSensor
    node: sensor
  - type: Appearance
  - type: Sprite
    drawdepth: FloorObjects
    sprite: _DV/Structures/Specific/Atmospherics/sensor.rsi
    layers:
    - state: gsensor1
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { state: gsensor1 }
          False: { state: gsensor0 }
  - type: Tag
    tags:
    - AirSensor
    - ForceFixRotations

- type: entity
  parent: BaseItem
  id: AirSensorAssemblyGray
  name: air sensor assembly
  description: Air sensor assembly. An assembly of air sensors?
  components:
  - type: Item
    size: Small
  - type: Anchorable
  - type: Construction
    graph: AirSensor
    node: assembly
  - type: Sprite
    drawdepth: FloorObjects
    sprite: _DV/Structures/Specific/Atmospherics/sensor.rsi
    layers:
    - state: gsensor0


# put this in a burn chamber or something you don't want to have show up as dangerous
- type: entity
  parent: [ AirSensor, BaseUnsetSensor ]
  id: AirSensorUnset

- type: entity
  parent: [ AirSensorGray, BaseUnsetSensor ]
  id: AirSensorUnsetGray

- type: entity
  abstract: true
  id: BaseUnsetSensor
  suffix: Unset
  components:
  - type: AtmosMonitor
    temperatureThresholdId: ignore
    pressureThresholdId: ignore
    gasThresholdPrototypes:
      Oxygen: ignore
      Nitrogen: ignore
      CarbonDioxide: ignore
      Plasma: ignore
      Tritium: ignore
      WaterVapor: ignore
      Ammonia: ignore
      NitrousOxide: ignore
      Frezon: ignore
